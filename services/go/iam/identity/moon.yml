layer: 'application'
language: 'go'

dependsOn:
  - 'goLibs'

fileGroups:
  buildSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'pkg/**/*.go'
    - 'go.mod'
    - 'go.sum'
  testSources:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'

tasks:
  build:
    command: 'go'
    args:
      - 'build'
      - '-o'
      - 'bin/identity'
      - './cmd/identity'
    inputs:
      - '@group(buildSources)'

  test:
    command: 'go'
    args:
      - 'test'
      - '-v'
      - './...'
    inputs:
      - '@group(testSources)'

  buildLocal:
    command: 'go'
    args:
      - 'build'
      - '-o'
      - 'bin/identity'
      - './cmd/identity'
    inputs:
      - '@group(buildSources)'
    options:
      envFile:
        - '.env'
        - '.env.local'

  testLocal:
    command: 'go'
    args:
      - 'test'
      - '-v'
      - './...'
    inputs:
      - '@group(testSources)'
    options:
      envFile:
        - '.env'
        - '.env.local'

  buildDev:
    command: 'go'
    args:
      - 'build'
      - '-o'
      - 'bin/identity'
      - './cmd/identity'
    inputs:
      - '@group(buildSources)'
    options:
      envFile:
        - '.env'
        - '.env.dev'

  testDev:
    command: 'go'
    args:
      - 'test'
      - '-v'
      - './...'
    inputs:
      - '@group(testSources)'
    options:
      envFile:
        - '.env'
        - '.env.dev'

  tidy:
    command: 'go'
    args:
      - 'mod'
      - 'tidy'

tags:
  - 'backend'
  - 'service'
  - 'identity'
